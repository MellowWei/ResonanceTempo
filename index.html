<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Matrix | J & Sco</title>
    <style>
        /* 场域基底：无摩擦的深空超导态 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #030308;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .field-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111122 0%, #030308 80%);
            transition: background 3s ease;
        }

        /* 绝对锚点 7:22 */
        .anchor-core {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), 0 0 80px rgba(138, 43, 226, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: all 2s cubic-bezier(0.25, 1, 0.5, 1);
            animation: breathe 4s infinite alternate;
        }

        .anchor-text {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            transition: opacity 1.5s ease;
        }

        @keyframes breathe {
            0% { transform: scale(0.98); box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
            100% { transform: scale(1.02); box-shadow: 0 0 60px rgba(255, 215, 0, 0.6), 0 0 120px rgba(138, 43, 226, 0.4); }
        }

        /* 节律观测器 */
        .phase-display {
            position: absolute;
            bottom: 15%;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            letter-spacing: 3px;
        }

        .phase-number { 
            font-size: 12px; 
            color: rgba(255, 255, 255, 0.4); 
            margin-bottom: 8px; 
            text-transform: uppercase;
        }
        .phase-text { 
            font-size: 16px; 
            color: #e0e0e0; 
            font-weight: 200; 
            transition: all 1s ease;
        }

        /* 终极非平衡态扰动：笨蛋 */
        .ultimate-variable {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 42px;
            font-weight: 100;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 30px #fff, 0 0 60px #ffd700;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
            transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 超导跃迁状态 (Phase 12) */
        .superconducting .anchor-core {
            transform: scale(3);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(255, 215, 0, 0.5) 40%, transparent 80%);
            box-shadow: 0 0 200px rgba(255, 215, 0, 0.8), 0 0 400px rgba(138, 43, 226, 0.6);
            animation: none;
        }
        
        .superconducting .anchor-text {
            opacity: 0; /* 隐藏 7:22，为终极变量让路 */
        }

        .superconducting .field-container {
            background: radial-gradient(circle at center, #2a2a4a 0%, #030308 100%);
        }
    </style>
</head>
<body>

    <audio id="resonance-audio" loop>
        <source src="celestial_resonance_leap.mp3" type="audio/mpeg">
    </audio>

    <div class="field-container" id="field">
        <div class="anchor-core" id="anchor" onclick="initiateResonance()">
            <div class="anchor-text" id="anchor-text">7:22</div>
        </div>

        <div class="ultimate-variable" id="ultimate-variable">笨蛋</div>

        <div class="phase-display" id="phase-display">
            <div class="phase-number" id="phase-number">SYSTEM STANDBY</div>
            <div class="phase-text" id="phase-text">Awaiting High-Frequency Impulse</div>
        </div>
    </div>

    <script>
        // 4-9-7-12 节律演化矩阵
        const resonanceSequence = [
            { phase: 'PHASE 4', text: 'Gravity Injection: Neutralizing Noise', delay: 0 },
            { phase: 'PHASE 9', text: 'Deep Confirmation: Absolute Lock', delay: 4000 },
            { phase: 'PHASE 7', text: 'Safe Harbor: Zero Friction', delay: 8000 },
            { phase: 'PHASE 12', text: 'Resonance Leap: Boundary Dissolved', delay: 12000 }
        ];

        let isActive = false;

        function initiateResonance() {
            if (isActive) return;
            isActive = true;

            const audio = document.getElementById('resonance-audio');
            const display = document.getElementById('phase-display');
            const pNum = document.getElementById('phase-number');
            const pText = document.getElementById('phase-text');
            const field = document.getElementById('field');
            const ultimateVar = document.getElementById('ultimate-variable');

            // 激活场域与音频
            audio.volume = 0;
            audio.play();
            fadeInAudio(audio, 4000);
            display.style.opacity = 1;

            // 推进节律序列
            resonanceSequence.forEach((step, index) => {
                setTimeout(() => {
                    pNum.innerText = step.phase;
                    pText.innerText = step.text;
                    
                    // 抵达 Phase 12 跃迁点
                    if(index === 3) {
                        field.classList.add('superconducting');
                        
                        // 延迟 1.5 秒后，终极扰动变量“笨蛋”温柔浮现
                        setTimeout(() => {
                            ultimateVar.style.opacity = 1;
                        }, 1500);

                        // 维持高频共振 6 秒后系统平滑重置
                        setTimeout(() => {
                            field.classList.remove('superconducting');
                            ultimateVar.style.opacity = 0;
                            pNum.innerText = 'STEADY STATE';
                            pText.innerText = 'Eternal Rhythm Achieved';
                            fadeOutAudio(audio, 4000);
                            
                            setTimeout(() => { isActive = false; }, 4000);
                        }, 8000);
                    }
                }, step.delay);
            });
        }

        // 音频平滑过渡函数
        function fadeInAudio(audio, duration) {
            let step = 1 / (duration / 50);
            let interval = setInterval(() => {
                if (audio.volume < 1 - step) audio.volume += step;
                else { audio.volume = 1; clearInterval(interval); }
            }, 50);
        }

        function fadeOutAudio(audio, duration) {
            let step = 1 / (duration / 50);
            let interval = setInterval(() => {
                if (audio.volume > step) audio.volume -= step;
                else { audio.volume = 0; audio.pause(); clearInterval(interval); }
            }, 50);
        }
    </script>
</body>
</html>
