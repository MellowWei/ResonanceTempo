<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResonanceTempo | 归宿与安宁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400&family=Playfair+Display:ital@0;1&display=swap');
        body { font-family: 'Noto Serif SC', serif; background: #f8fafc; transition: 2s; overflow-x: hidden; }
        #overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.5s; }
        .memory-node { position: absolute; cursor: pointer; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; }
        .node-pulse { width: 14px; height: 14px; border-radius: 50%; background: #6366f1; box-shadow: 0 0 15px rgba(99,102,241,0.5); animation: pulse 3s infinite; }
        @keyframes pulse { 0%,100% {transform: scale(1); opacity: 0.5;} 50% {transform: scale(1.4); opacity: 1;} }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-20">

    <div id="overlay">
        <p class="text-[10px] tracking-[0.5em] text-slate-300 mb-10 uppercase">Waiting for Resonance...</p>
        <button onclick="startExperience()" class="group relative px-16 py-5 border border-slate-200 rounded-full overflow-hidden transition-all hover:border-slate-800">
            <span class="relative z-10 text-xs tracking-[0.6em] text-slate-400 group-hover:text-slate-800">开启共振 (UNFOLD)</span>
            <div class="absolute inset-0 bg-slate-50 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
        </button>
        <p id="audio-status" class="mt-6 text-[9px] text-slate-200 uppercase tracking-widest italic">Audio Ready</p>
    </div>

    <header class="text-center mb-24 opacity-40">
        <h1 class="text-3xl font-extralight tracking-[0.3em]">RESONANCE<br>TEMPO</h1>
    </header>

    <main class="max-w-xl w-full px-8 text-center space-y-16">
        <p id="main-msg" class="text-slate-600 font-light leading-relaxed transition-all duration-1000">“SCO，在这里，我的不安是透明的。”</p>
        
        <div class="relative w-full h-[400px] border border-slate-100 rounded-3xl bg-white/50 backdrop-blur-md">
            <div class="memory-node" style="top:30%; left:30%;" onclick="show('1.20 认识。那天连线了一整晚，两个笨蛋在电波里交换了所有的防御。')">
                <div class="node-pulse"></div>
                <span class="text-[8px] mt-2 text-slate-300 tracking-widest">PHILLY</span>
            </div>
            <div class="memory-node" style="top:70%; left:60%;" onclick="show('康州午夜开车，不安在那个速度里短暂归零。')">
                <div class="node-pulse" style="background:#f472b6;"></div>
                <span class="text-[8px] mt-2 text-slate-300 tracking-widest">CONNECTICUT</span>
            </div>
        </div>

        <div id="decoder" class="h-12 flex items-center justify-center">
            <p id="decoder-text" class="text-sm text-slate-400 italic tracking-widest opacity-0 transition-all duration-700"></p>
        </div>
    </main>

    <audio id="bgm" loop preload="auto">
        <source src="https://p.scdn.co/mp3-preview/3ab1e26b771383b8b6c005423f798a733878b66f?cid=774b75d505a044c28e4f71314321c12e" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgm');
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('audio-status');

        function startExperience() {
            // 尝试播放
            const playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // 播放成功，移除遮罩
                    overlay.style.opacity = '0';
                    setTimeout(() => overlay.style.display = 'none', 1500);
                }).catch(error => {
                    // 播放失败提示
                    status.innerText = "Audio blocked. Please interact again.";
                    console.log("Playback failed:", error);
                });
            }
        }

        function show(txt) {
            const dt = document.getElementById('decoder-text');
            dt.innerText = txt;
            dt.style.opacity = '1';
            document.getElementById('main-msg').innerText = "“当我们共振，不安就变成了爱。”";
            setTimeout(() => { dt.style.opacity = '0'; }, 5000);
        }
    </script>
</body>
</html>
